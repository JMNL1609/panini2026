<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>FIFA World Cup 2026 · Panini · Álbum Interactivo</title>
  
  <meta name="theme-color" content="#030614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Panini 2026">
  <link rel="manifest" href="manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --gold: #F5C542;
      --gold-dark: #C6921E;
      --gold-glow: rgba(245, 197, 66, 0.35);
      --red: #E03A3E;
      --red-dim: #A12226;
      --blue-deep: #0A1A3A;
      --blue-mid: #0F2648;
      --blue-light: #1A3A6E;
      --bg-main: #030614;
      --card-bg: #0B1429;
      --border-glow: rgba(245, 197, 66, 0.25);
      --text-light: #F0F3FA;
      --text-muted: #8A9DC0;
      --owned-bg: #0C331F;
      --owned-border: #2AD18A;
      --owned-text: #A3F0C0;
      --orange-bg: #3B1A0A;
      --orange-border: #FF8C00;
      --orange-text: #FFD700;
      --stadium-gradient: linear-gradient(145deg, #0C1428 0%, #061027 100%);
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-light);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 40%, rgba(232, 192, 68, 0.03) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      background: linear-gradient(135deg, #04112e 0%, #071a3a 100%);
      border-bottom: 3px solid var(--gold);
      padding: 1.5rem 1rem;
      text-align: center;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .hero::after {
      content: "⚽🏆⚽";
      position: absolute;
      bottom: 0;
      right: 10px;
      font-size: 70px;
      opacity: 0.05;
      pointer-events: none;
      font-family: monospace;
      white-space: pre;
    }

    .trophy-icon {
      font-size: 3rem;
      filter: drop-shadow(0 0 12px var(--gold-glow));
      animation: floatTrophy 3s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes floatTrophy {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .main-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(2rem, 8vw, 3.8rem);
      letter-spacing: 6px;
      background: linear-gradient(135deg, #FFE6A3, #E8B82E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      margin: 0.2rem 0;
    }

    .subhead {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px dashed rgba(245,197,66,0.3);
      display: inline-block;
      padding-top: 0.5rem;
    }

    .owner-badge {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: 0.2rem 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 0.8rem;
      border: 1px solid rgba(245,197,66,0.4);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .stats-panel {
      background: rgba(8, 18, 38, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-glow);
      padding: 0.8rem 1rem;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-evenly;
      gap: 1rem;
    }

    .stat-card {
      background: rgba(255,255,255,0.02);
      padding: 0.4rem 0.8rem;
      border-radius: 24px;
      min-width: 70px;
      text-align: center;
      border: 1px solid rgba(245,197,66,0.15);
    }

    .stat-number {
      font-family: 'Bebas Neue', cursive;
      font-size: 2rem;
      line-height: 1;
      font-weight: 600;
    }

    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    .gold-text { color: var(--gold); }
    .green-text { color: #2AD18A; }
    .red-text { color: #FF6B6B; }

    .progress-container {
      flex: 1;
      min-width: 180px;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      margin-bottom: 0.3rem;
      font-weight: 600;
    }

    .progress-bar-bg {
      background: #1F2A44;
      height: 10px;
      border-radius: 12px;
      overflow: hidden;
    }

    .progress-fill-main {
      background: linear-gradient(90deg, var(--gold), #2AD18A);
      width: 0%;
      height: 100%;
      border-radius: 12px;
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .action-bar {
      padding: 0.8rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
      align-items: center;
      background: rgba(6, 14, 28, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(245,197,66,0.2);
    }

    .search-field {
      flex: 2;
      min-width: 150px;
      background: #0A1125;
      border: 1px solid var(--border-glow);
      border-radius: 48px;
      padding: 0.6rem 1rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .search-field input {
      background: transparent;
      border: none;
      flex: 1;
      color: white;
      font-size: 0.85rem;
      outline: none;
    }

    .search-field input::placeholder {
      color: #5F74A0;
    }

    .btn {
      background: rgba(20, 35, 65, 0.9);
      border: 1px solid rgba(245,197,66,0.4);
      padding: 0.5rem 1rem;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #E0E9FF;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }

    .btn:active { transform: scale(0.96); background: rgba(245,197,66,0.2);}
    
    .btn.active-view {
      background: rgba(245,197,66,0.25);
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-pdf {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid #dc3545;
      color: #ff6b6b;
      display: none;
    }

    .btn-pdf.visible {
      display: inline-flex;
    }

    .flags-nav {
      padding: 0.7rem 1rem;
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(245,197,66,0.2);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .flag-btn {
      background: rgba(20, 30, 55, 0.8);
      border: 1px solid rgba(245,197,66,0.3);
      border-radius: 30px;
      padding: 0.6rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      color: var(--text-light);
      backdrop-filter: blur(4px);
    }

    .flag-btn:active {
      transform: scale(0.94);
      background: rgba(245,197,66,0.3);
    }

    .teams-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1rem;
      padding: 1rem;
      max-width: 1600px;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .team-card {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid rgba(245,197,66,0.2);
      overflow: hidden;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .team-card.complete {
      border-color: #2AD18A;
      box-shadow: 0 0 8px rgba(42,209,138,0.3);
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 0.7rem;
      padding: 0.75rem 1rem;
      background: linear-gradient(95deg, rgba(245,197,66,0.08), transparent);
      cursor: pointer;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .team-flag {
      font-size: 1.8rem;
      filter: drop-shadow(0 2px 4px black);
    }

    .team-code {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.5rem;
      color: var(--gold);
      letter-spacing: 1px;
    }

    .team-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .team-stats {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .team-progress-bar {
      width: 55px;
      height: 5px;
      background: #1F2A44;
      border-radius: 4px;
      overflow: hidden;
    }

    .team-progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      border-radius: 4px;
    }

    .complete-tag {
      background: #1c5438;
      padding: 0 8px;
      border-radius: 20px;
      font-size: 0.6rem;
      color: #A2F0C0;
      display: none;
    }

    .team-card.complete .complete-tag { display: inline-block; }

    .sticker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 12px;
      padding-bottom: 40px;
      background: rgba(0,0,0,0.2);
      position: relative;
    }

    .sticker {
      width: 58px;
      height: 36px;
      background: #0F172F;
      border-radius: 8px;
      border: 1px solid #2A3A60;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      color: #9AACD0;
      cursor: pointer;
      transition: all 0.12s linear;
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      position: relative;
    }

    .sticker:active {
      transform: scale(0.96);
    }

    .sticker.owned {
      background: linear-gradient(145deg, #0D3B20, #072613);
      border-color: var(--owned-border);
      color: #C6FFDD;
      box-shadow: 0 0 6px rgba(42,209,138,0.3);
    }

    .sticker.duplicate {
      background: linear-gradient(145deg, #3B1A0A, #2A0E04);
      border-color: #FF8C00;
      color: #FFD700;
      box-shadow: 0 0 8px rgba(255,140,0,0.4);
    }

    .duplicate-badge {
      position: absolute;
      top: -8px;
      right: -8px;
      background: #FF8C00;
      color: white;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 900;
      border: 2px solid #030614;
      box-shadow: 0 0 8px rgba(255,140,0,0.6);
      z-index: 10;
    }

    @keyframes stickerPop {
      0% { transform: scale(1); background: rgba(245,197,66,0.3);}
      50% { transform: scale(1.2); background: rgba(245,197,66,0.5);}
      100% { transform: scale(1);}
    }

    .sticker-pop {
      animation: stickerPop 0.2s ease;
    }

    .team-card.hidden {
      display: none;
    }

    .scroll-top-btn {
      position: absolute;
      bottom: 8px;
      right: 12px;
      background: rgba(20, 35, 65, 0.9);
      border: 1px solid var(--gold);
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.65rem;
      font-weight: 600;
      color: var(--gold);
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      z-index: 5;
    }

    .scroll-top-btn:active {
      transform: scale(0.94);
      background: rgba(245,197,66,0.2);
    }

    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #101a32e6;
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 1000;
      transition: transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      font-family: monospace;
    }

    .toast-notify.show {
      transform: translateX(-50%) translateY(0px);
    }

    .world-cup-footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.6rem;
      color: #4a6188;
      border-top: 1px solid rgba(245,197,66,0.15);
      margin-top: 1rem;
      background: radial-gradient(circle at bottom, #0a0f1e, transparent);
    }

    /* Modal styles */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .modal-dialog {
      background: linear-gradient(145deg, #0F1A3A, #081028);
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: 2rem;
      text-align: center;
      box-shadow: 0 0 30px rgba(245,197,66,0.3);
      min-width: 280px;
    }

    .modal-dialog p {
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
      color: var(--text-light);
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .modal-buttons button {
      padding: 0.6rem 1.5rem;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
    }

    .btn-undo {
      background: rgba(245,197,66,0.2);
      border: 2px solid var(--gold);
      color: var(--gold);
    }

    .btn-close {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    @media (max-width: 650px) {
      .sticker-grid {
        gap: 5px;
      }
      .sticker {
        width: calc(12% - 4px);
        min-width: 48px;
        height: 34px;
        font-size: 0.65rem;
      }
      .btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.65rem;
      }
      .team-code {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

<div class="hero" id="topPage">
  <div class="trophy-icon">🏆✨⚽</div>
  <h1 class="main-title">FIFA WORLD CUP 2026</h1>
  <div class="subhead">PANINI DIGITAL ALBUM · EDITION GOLD</div>
  <div class="owner-badge">
    <span>👤</span>
    <span style="letter-spacing: 1.5px;">SEBASTIAN NAVARRO</span>
    <span style="font-size:1rem;">🇲🇽🇺🇸🇨🇦</span>
  </div>
</div>

<div class="stats-panel">
  <div class="stat-card"><div class="stat-number green-text" id="stat-owned">0</div><div class="stat-label">TENGO</div></div>
  <div class="stat-card"><div class="stat-number red-text" id="stat-missing">0</div><div class="stat-label">FALTAN</div></div>
  <div class="stat-card"><div class="stat-number gold-text" id="stat-total">0</div><div class="stat-label">TOTAL</div></div>
  <div class="stat-card"><div class="stat-number gold-text" id="stat-percent">0%</div><div class="stat-label">COMPLETO</div></div>
  <div class="progress-container">
    <div class="progress-header"><span>🏟️ PROGRESO MUNDIAL 2026</span><span id="progress-ratio">0/0</span></div>
    <div class="progress-bar-bg"><div class="progress-fill-main" id="global-progress-fill"></div></div>
  </div>
</div>

<div class="action-bar">
  <div class="search-field">
    <span>🔍</span>
    <input type="text" id="searchTeam" placeholder="Buscar equipo o código (ej: MEX, Brasil)" autocomplete="off">
  </div>
  <button class="btn active-view" id="albumBtn">📒 Álbum</button>
  <button class="btn" id="missingBtn">🔍 Me faltan</button>
  <button class="btn" id="duplicatesBtn">🔄 Repetidas</button>
  <button class="btn btn-pdf" id="pdfBtn">📄 Exportar PDF</button>
</div>

<div class="flags-nav" id="flagsNavContainer"></div>

<div class="teams-grid" id="teamsContainer"></div>
<div class="world-cup-footer">
  ⚽ 48 EQUIPOS · 988 CROMOS OFICIALES ⚽<br>
  Toca cada sticker para coleccionar · Completa todas las selecciones
</div>
<div id="toastMsg" class="toast-notify"></div>

<script>
  const SECTIONS = [
    { code:'FWC', name:'FIFA World Cup',      flag:'🏆', n:19 },

    { code:'SWE', name:'Suecia',              flag:'🇸🇪', n:20 },

    { code:'ALG', name:'Argelia',             flag:'🇩🇿', n:20 },

    { code:'JOR', name:'Jordania',            flag:'🇯🇴', n:20 },
    { code:'POR', name:'Portugal',            flag:'🇵🇹', n:20 },

    { code:'UZB', name:'Uzbekistán',          flag:'🇺🇿', n:20 },
    { code:'COL', name:'Colombia',            flag:'🇨🇴', n:20 },
    { code:'ENG', name:'Inglaterra',          flag:'🏴󠁧󠁢󠁥󠁮󠁧󠁿', n:20 },
    { code:'CRO', name:'Croacia',             flag:'🇭🇷', n:20 },
    { code:'GHA', name:'Ghana',               flag:'🇬🇭', n:20 },
    { code:'PAN', name:'Panamá',              flag:'🇵🇦', n:20 },
    { code:'CC',  name:'Tarjetas Especiales', flag:'⭐',  n:14 },
  ];

  // Mapa de códigos de país a códigos de bandera para CDN
  const FLAG_CDN_MAP = {
    'FWC': 'fifa',
    'MEX': 'mx',
    'RSA': 'za',
    'KOR': 'kr',
    'CZE': 'cz',
    'CAN': 'ca',
    'BIH': 'ba',
    'QAT': 'qa',
    'SUI': 'ch',
    'BRA': 'br',
    'MAR': 'ma',
    'HAI': 'ht',
    'SCO': 'gb-sct',
    'USA': 'us',
    'PAR': 'py',
    'AUS': 'au',
    'TUR': 'tr',
    'GER': 'de',
    'CUW': 'cw',
    'CIV': 'ci',
    'ECU': 'ec',
    'NED': 'nl',
    'JPN': 'jp',
    'SWE': 'se',
    'TUN': 'tn',
    'BEL': 'be',
    'EGY': 'eg',
    'IRN': 'ir',
    'NZL': 'nz',
    'ESP': 'es',
    'CPV': 'cv',
    'KSA': 'sa',
    'URU': 'uy',
    'FRA': 'fr',
    'SEN': 'sn',
    'IRQ': 'iq',
    'NOR': 'no',
    'ARG': 'ar',
    'ALG': 'dz',
    'AUT': 'at',
    'JOR': 'jo',
    'POR': 'pt',
    'COD': 'cd',
    'UZB': 'uz',
    'COL': 'co',
    'ENG': 'gb-eng',
    'CRO': 'hr',
    'GHA': 'gh',
    'PAN': 'pa',
    'CC': 'star'
  };

  const TOTAL_STICKERS = SECTIONS.reduce((acc, s) => acc + s.n, 0);
  let ownedState = {};
  let currentView = 'album';
  let longPressTimer = null;
  let pendingStickerId = null;

  try {
    const saved = localStorage.getItem('panini2026_app');
    if(saved) ownedState = JSON.parse(saved);
  } catch(e) { console.warn(e); }

  function persist() {
    localStorage.setItem('panini2026_app', JSON.stringify(ownedState));
  }

  function getOwnedCount() {
    return Object.values(ownedState).filter(v => v >= 1).length;
  }

  function getDuplicateCount() {
    return Object.values(ownedState).filter(v => v >= 2).length;
  }

  function getMissingStickers() {
    const missing = [];
    SECTIONS.forEach(sec => {
      const missingInSection = [];
      for(let i=1; i<=sec.n; i++) {
        const stickerId = `${sec.code}${i}`;
        if (!ownedState[stickerId] || ownedState[stickerId] === 0) {
          missingInSection.push({
            id: stickerId,
            code: sec.code,
            name: sec.name,
            flag: sec.flag,
            flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(),
            number: i
          });
        }
      }
      if (missingInSection.length > 0) {
        missing.push({
          code: sec.code,
          name: sec.name,
          flag: sec.flag,
          flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(),
          stickers: missingInSection,
          count: missingInSection.length
        });
      }
    });
    return missing;
  }

  async function generatePDF() {
    const missingData = getMissingStickers();
    
    if (missingData.length === 0) {
      showToast('🎉 ¡No tienes cromos faltantes!', 2000);
      return;
    }

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({
        orientation: 'portrait',
        unit: 'mm',
        format: 'letter'
      });

      // Configuración de la página
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 12;
      
      // Encabezado principal estilo álbum
      doc.setFillColor(4, 18, 46); // Color hero: #04112e
      doc.rect(0, 0, pageWidth, 35, 'F');
      
      // Línea dorada debajo del encabezado
      doc.setDrawColor(245, 197, 66);
      doc.setLineWidth(1.5);
      doc.line(0, 35, pageWidth, 35);

      // Título principal
      doc.setTextColor(245, 197, 66);
      doc.setFontSize(24);
      doc.setFont('helvetica', 'bold');
      doc.text('FIFA WORLD CUP 2026', pageWidth / 2, 15, { align: 'center' });
      
      // Subtítulo
      doc.setTextColor(138, 157, 192);
      doc.setFontSize(8);
      doc.text('PANINI DIGITAL ALBUM · EDITION GOLD', pageWidth / 2, 22, { align: 'center' });
      
      // Información del propietario
      doc.setTextColor(245, 197, 66);
      doc.setFontSize(9);
      doc.text('SEBASTIAN NAVARRO', pageWidth / 2, 30, { align: 'center' });

      // Información del documento
      doc.setTextColor(100, 100, 100);
      doc.setFontSize(8);
      doc.text(`Fecha: ${new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' })}`, margin, 42);
      
      const totalMissing = missingData.reduce((sum, team) => sum + team.count, 0);
      doc.text(`Total de cromos faltantes: ${totalMissing} de ${TOTAL_STICKERS}`, margin, 47);
      doc.text(`Progreso: ${Math.round(((TOTAL_STICKERS - totalMissing) / TOTAL_STICKERS) * 100)}% completado`, margin, 52);

      let yPos = 60;
      const maxY = pageHeight - 20;
      
      // Flag images cache
      const flagCache = {};
      
      // Recorrer equipos en el orden exacto de SECTIONS
      for (const team of missingData) {
        // Verificar si necesitamos nueva página
        if (yPos + 25 > maxY) {
          doc.addPage();
          yPos = 20;
          
          // Pie de página en la página anterior
          addFooter(doc, pageWidth, pageHeight, margin);
        }

        // Fondo del encabezado del equipo
        doc.setFillColor(15, 38, 72); // Color azul oscuro
        doc.roundedRect(margin, yPos, pageWidth - (margin * 2), 4, 2, 2, 'F');
        
        // Cargar y agregar bandera
        const flagCode = team.flagCdn;
        let flagImg = null;
        
        if (!flagCache[flagCode]) {
          try {
            // Usar flagcdn.com para banderas de alta calidad
            const flagUrl = `https://flagcdn.com/w40/${flagCode}.png`;
            flagImg = await loadImage(flagUrl);
            flagCache[flagCode] = flagImg;
          } catch (e) {
            console.warn(`No se pudo cargar bandera para ${team.code}`, e);
            flagCache[flagCode] = null;
          }
        } else {
          flagImg = flagCache[flagCode];
        }

        if (flagImg && team.code !== 'FWC' && team.code !== 'CC') {
          try {
            doc.addImage(flagImg, 'PNG', margin + 2, yPos + 0.5, 4, 3);
          } catch (e) {
            console.warn(`Error al agregar imagen de bandera para ${team.code}`);
          }
          
          // Texto del equipo (con desplazamiento por la bandera)
          doc.setTextColor(245, 197, 66);
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.text(`${team.code} - ${team.name}`, margin + 11, yPos + 3);
        } else {
          // Para FWC y CC usar emoji como texto
          doc.setTextColor(245, 197, 66);
          doc.setFontSize(10);
          doc.setFont('helvetica', 'bold');
          doc.text(`${team.code} - ${team.name}`, margin + 3, yPos + 3);
        }
        
        // Cantidad de faltantes
        doc.setTextColor(255, 107, 107);
        doc.setFontSize(8);
        doc.text(`(${team.count} faltantes)`, pageWidth - margin - 25, yPos + 2.5, { align: 'right' });
        
        yPos += 6;

        // Crear grid de stickers
        const stickersPerRow = 20;
        const stickerWidth = 7.5;
        const stickerHeight = 3;
        const startX = margin + 2;
        
        for (let i = 0; i < team.stickers.length; i += stickersPerRow) {
          if (yPos + stickerHeight + 2 > maxY) {
            doc.addPage();
            yPos = 20;
            addFooter(doc, pageWidth, pageHeight, margin);
          }

          const row = team.stickers.slice(i, i + stickersPerRow);
          
          row.forEach((sticker, index) => {
            const x = startX + (index * (stickerWidth + 2));
            
            // Fondo del sticker (blanco)
            doc.setFillColor(255, 255, 255);
            doc.roundedRect(x, yPos, stickerWidth, stickerHeight, 1.5, 1.5, 'F');
            
            // Borde del sticker (negro)
            doc.setDrawColor(0, 0, 0);
            doc.setLineWidth(0.3);
            doc.roundedRect(x, yPos, stickerWidth, stickerHeight, 1.5, 1.5, 'S');

            // Texto del sticker (negro)
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(6);
            doc.setFont('courier', 'bold');
            doc.text(sticker.id, x + stickerWidth/2, yPos + 2, { align: 'center' });
          });
          
          yPos += stickerHeight + 1,5;
        }

        yPos += 2; // Espacio entre equipos
      }

      // Pie de página en la última página
      addFooter(doc, pageWidth, pageHeight, margin);

      // Guardar el PDF
      const fileName = `Panini2026_Faltantes_${new Date().toISOString().split('T')[0]}.pdf`;
      doc.save(fileName);
      
      showToast(`✅ PDF generado: ${fileName}`, 2500);
    } catch (error) {
      console.error('Error generando PDF:', error);
      showToast('❌ Error al generar PDF. Intenta de nuevo.', 2500);
    }
  }

  function addFooter(doc, pageWidth, pageHeight, margin) {
    const footerY = pageHeight - 12;
    doc.setDrawColor(245, 197, 66);
    doc.setLineWidth(0.3);
    doc.line(margin, footerY - 3, pageWidth - margin, footerY - 3);
    
    doc.setTextColor(100, 100, 100);
    doc.setFontSize(6);
    doc.setFont('helvetica', 'normal');
    doc.text('FIFA World Cup 2026 - Panini Digital Album - Lista de Cromos Faltantes', margin, footerY);
    doc.text(`© ${new Date().getFullYear()} - Generado por Sebastián Navarro`, pageWidth - margin, footerY, { align: 'right' });
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = 'Anonymous';
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  function updateGlobalStats() {
    const ownedCount = getOwnedCount();
    const missing = TOTAL_STICKERS - ownedCount;
    const percent = TOTAL_STICKERS ? Math.round((ownedCount / TOTAL_STICKERS) * 100) : 0;

    document.getElementById('stat-owned').innerText = ownedCount;
    document.getElementById('stat-missing').innerText = missing;
    document.getElementById('stat-total').innerText = TOTAL_STICKERS;
    document.getElementById('stat-percent').innerText = `${percent}%`;
    document.getElementById('progress-ratio').innerText = `${ownedCount}/${TOTAL_STICKERS}`;
    document.getElementById('global-progress-fill').style.width = `${percent}%`;

    SECTIONS.forEach(sec => {
      let collected = 0;
      for(let i=1; i<=sec.n; i++) if(ownedState[`${sec.code}${i}`] >= 1) collected++;
      const totalSec = sec.n;
      const widthPercent = totalSec ? (collected / totalSec) * 100 : 0;
      const pbFill = document.getElementById(`pb-${sec.code}`);
      const pnSpan = document.getElementById(`pn-${sec.code}`);
      const cardDiv = document.getElementById(`card-${sec.code}`);
      if(pbFill) pbFill.style.width = `${widthPercent}%`;
      if(pnSpan) {
        pnSpan.innerText = `${collected}/${totalSec}`;
        pnSpan.style.color = collected === totalSec ? '#2AD18A' : '#8A9DC0';
      }
      if(cardDiv) {
        if(collected === totalSec) cardDiv.classList.add('complete');
        else cardDiv.classList.remove('complete');
        applyCurrentView(cardDiv, sec, collected);
      }
    });

    // Mostrar/ocultar botón PDF
    const pdfBtn = document.getElementById('pdfBtn');
    if (currentView === 'missing') {
      pdfBtn.classList.add('visible');
    } else {
      pdfBtn.classList.remove('visible');
    }
  }
  
  function applyCurrentView(cardDiv, sec, collected) {
    const stickers = cardDiv.querySelectorAll('.sticker');
    stickers.forEach(sticker => {
      sticker.style.display = 'flex';
    });
    
    if (currentView === 'missing') {
      if (collected === sec.n) {
        cardDiv.classList.add('hidden');
      } else {
        cardDiv.classList.remove('hidden');
        stickers.forEach(sticker => {
          const stickerId = sticker.getAttribute('data-sticker-id');
          if (ownedState[stickerId] >= 1) {
            sticker.style.display = 'none';
          }
        });
      }
    } else if (currentView === 'duplicates') {
      let hasDuplicates = false;
      stickers.forEach(sticker => {
        const stickerId = sticker.getAttribute('data-sticker-id');
        if (ownedState[stickerId] >= 2) {
          sticker.style.display = 'flex';
          hasDuplicates = true;
        } else {
          sticker.style.display = 'none';
        }
      });
      if (!hasDuplicates) {
        cardDiv.classList.add('hidden');
      } else {
        cardDiv.classList.remove('hidden');
      }
    } else {
      cardDiv.classList.remove('hidden');
    }
  }

  function renderFlagsNav() {
    const flagsContainer = document.getElementById('flagsNavContainer');
    flagsContainer.innerHTML = '';
    SECTIONS.forEach(sec => {
      const flagBtn = document.createElement('div');
      flagBtn.className = 'flag-btn';
      flagBtn.innerHTML = `${sec.flag} ${sec.code}`;
      flagBtn.onclick = () => {
        const teamCard = document.getElementById(`card-${sec.code}`);
        if (teamCard) {
          teamCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
          teamCard.style.boxShadow = '0 0 20px rgba(245,197,66,0.6)';
          setTimeout(() => {
            teamCard.style.boxShadow = '';
          }, 1500);
        }
      };
      flagsContainer.appendChild(flagBtn);
    });
  }

  function updateStickerAppearance(stickerEl, stickerId) {
    const count = ownedState[stickerId] || 0;
    
    stickerEl.classList.remove('owned', 'duplicate');
    
    const existingBadge = stickerEl.querySelector('.duplicate-badge');
    if (existingBadge) existingBadge.remove();
    
    if (count === 1) {
      stickerEl.classList.add('owned');
    } else if (count >= 2) {
      stickerEl.classList.add('duplicate');
      const badge = document.createElement('div');
      badge.className = 'duplicate-badge';
      badge.textContent = count - 1;
      stickerEl.appendChild(badge);
    }
  }

  function renderAll() {
    const container = document.getElementById('teamsContainer');
    container.innerHTML = '';
    SECTIONS.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'team-card';
      card.id = `card-${sec.code}`;
      card.dataset.code = sec.code.toLowerCase();
      card.dataset.name = sec.name.toLowerCase();

      const header = document.createElement('div');
      header.className = 'team-header';
      header.onclick = () => toggleTeam(sec.code, sec.n);
      header.innerHTML = `
        <span class="team-flag">${sec.flag}</span>
        <span class="team-code">${sec.code}</span>
        <span class="team-name">${sec.name}</span>
        <div class="team-stats">
          <span id="pn-${sec.code}" style="font-weight:600;">0/${sec.n}</span>
          <div class="team-progress-bar"><div class="team-progress-fill" id="pb-${sec.code}" style="width:0%"></div></div>
          <span class="complete-tag">✓ COMPLETO</span>
        </div>
      `;
      card.appendChild(header);

      const gridDiv = document.createElement('div');
      gridDiv.className = 'sticker-grid';
      for(let i=1; i<=sec.n; i++) {
        const stickerId = `${sec.code}${i}`;
        const count = ownedState[stickerId] || 0;
        const stickerEl = document.createElement('div');
        stickerEl.className = 'sticker';
        stickerEl.textContent = stickerId;
        stickerEl.setAttribute('data-sticker-id', stickerId);
        
        if (count === 1) {
          stickerEl.classList.add('owned');
        } else if (count >= 2) {
          stickerEl.classList.add('duplicate');
          const badge = document.createElement('div');
          badge.className = 'duplicate-badge';
          badge.textContent = count - 1;
          stickerEl.appendChild(badge);
        }
        
        stickerEl.onclick = (e) => {
          e.stopPropagation();
          handleStickerClick(stickerId);
        };
        
        stickerEl.addEventListener('mousedown', (e) => {
          startLongPress(e, stickerId);
        });
        
        stickerEl.addEventListener('touchstart', (e) => {
          startLongPress(e, stickerId);
        }, {passive: false});
        
        stickerEl.addEventListener('mouseup', cancelLongPress);
        stickerEl.addEventListener('mouseleave', cancelLongPress);
        stickerEl.addEventListener('touchend', cancelLongPress);
        stickerEl.addEventListener('touchcancel', cancelLongPress);
        stickerEl.addEventListener('touchmove', cancelLongPress);
        
        gridDiv.appendChild(stickerEl);
      }
      
      const scrollTopBtn = document.createElement('button');
      scrollTopBtn.className = 'scroll-top-btn';
      scrollTopBtn.textContent = '⬆️ Subir';
      scrollTopBtn.onclick = (e) => {
        e.stopPropagation();
        document.getElementById('topPage').scrollIntoView({ behavior: 'smooth' });
      };
      gridDiv.appendChild(scrollTopBtn);
      
      card.appendChild(gridDiv);
      container.appendChild(card);
    });
    renderFlagsNav();
    updateGlobalStats();
  }

  function startLongPress(e, stickerId) {
    if (pendingStickerId) return;
    
    pendingStickerId = stickerId;
    longPressTimer = setTimeout(() => {
      if (pendingStickerId === stickerId) {
        showUndoModal(stickerId);
      }
      pendingStickerId = null;
      longPressTimer = null;
    }, 1000);
  }

  function cancelLongPress() {
    if (longPressTimer) {
      clearTimeout(longPressTimer);
      longPressTimer = null;
    }
    pendingStickerId = null;
  }

  function showUndoModal(stickerId) {
    const count = ownedState[stickerId] || 0;
    if (count === 0) {
      showToast(`${stickerId} no está marcado`, 1200);
      return;
    }
    
    const modalOverlay = document.createElement('div');
    modalOverlay.className = 'modal-overlay';
    
    const modalDialog = document.createElement('div');
    modalDialog.className = 'modal-dialog';
    
    const message = document.createElement('p');
    message.textContent = `¿Deseas deshacer ${stickerId}? (Estado actual: ${count > 1 ? 'Repetida x' + (count-1) : 'Marcada'})`;
    
    const buttonsDiv = document.createElement('div');
    buttonsDiv.className = 'modal-buttons';
    
    const undoBtn = document.createElement('button');
    undoBtn.className = 'btn-undo';
    undoBtn.textContent = '↩️ Deshacer';
    undoBtn.onclick = (e) => {
      e.stopPropagation();
      undoSticker(stickerId);
      document.body.removeChild(modalOverlay);
    };
    
    const closeBtn = document.createElement('button');
    closeBtn.className = 'btn-close';
    closeBtn.textContent = '✖️ Cerrar';
    closeBtn.onclick = (e) => {
      e.stopPropagation();
      document.body.removeChild(modalOverlay);
    };
    
    buttonsDiv.appendChild(undoBtn);
    buttonsDiv.appendChild(closeBtn);
    modalDialog.appendChild(message);
    modalDialog.appendChild(buttonsDiv);
    modalOverlay.appendChild(modalDialog);
    
    modalOverlay.onclick = (e) => {
      if (e.target === modalOverlay) {
        document.body.removeChild(modalOverlay);
      }
    };
    
    document.body.appendChild(modalOverlay);
  }

  function undoSticker(stickerId) {
    const count = ownedState[stickerId] || 0;
    if (count === 0) return;
    
    if (count === 1) {
      delete ownedState[stickerId];
    } else {
      ownedState[stickerId] = count - 1;
    }
    
    persist();
    updateStickerUI(stickerId);
    updateGlobalStats();
    showToast(`${stickerId} deshecho un paso`, 1200);
  }

  function handleStickerClick(stickerId) {
    const count = ownedState[stickerId] || 0;
    
    if (count === 0) {
      ownedState[stickerId] = 1;
      showToast(`+ ${stickerId} obtenido`, 1200);
    } else if (count === 1) {
      ownedState[stickerId] = 2;
      showToast(`🔄 ${stickerId} repetida`, 1200);
    } else {
      ownedState[stickerId] = count + 1;
      showToast(`🔄 ${stickerId} repetida x${count}`, 1200);
    }
    
    persist();
    updateStickerUI(stickerId);
    updateGlobalStats();
  }

  function updateStickerUI(stickerId) {
    const stickerEl = document.querySelector(`.sticker[data-sticker-id="${stickerId}"]`);
    if (stickerEl) {
      updateStickerAppearance(stickerEl, stickerId);
      stickerEl.classList.add('sticker-pop');
      setTimeout(() => stickerEl.classList.remove('sticker-pop'), 200);
      
      const cardDiv = stickerEl.closest('.team-card');
      if (cardDiv) {
        const secCode = cardDiv.id.replace('card-', '');
        const sec = SECTIONS.find(s => s.code === secCode);
        if (sec) {
          let collected = 0;
          for(let i=1; i<=sec.n; i++) if(ownedState[`${sec.code}${i}`] >= 1) collected++;
          applyCurrentView(cardDiv, sec, collected);
        }
      }
    }
  }

  function toggleSticker(stickerId, teamCode, teamTotal) {
    handleStickerClick(stickerId);
  }

  function toggleTeam(code, total) {
    let anyMissing = false;
    for(let i=1; i<=total; i++) if(!ownedState[`${code}${i}`] || ownedState[`${code}${i}`] === 0) { anyMissing = true; break; }
    const setTo = anyMissing ? 1 : 0;
    for(let i=1; i<=total; i++) {
      const id = `${code}${i}`;
      if (setTo === 1) {
        ownedState[id] = 1;
      } else {
        delete ownedState[id];
      }
    }
    persist();
    for(let i=1; i<=total; i++) {
      const stickerDiv = document.querySelector(`.sticker[data-sticker-id="${code}${i}"]`);
      if(stickerDiv) {
        updateStickerAppearance(stickerDiv, `${code}${i}`);
        stickerDiv.classList.add('sticker-pop');
        setTimeout(() => stickerDiv.classList.remove('sticker-pop'), 150);
      }
    }
    updateGlobalStats();
    showToast(`${code}: ${setTo ? 'completado ✔️' : 'colección reiniciada'}`, 1400);
  }

  function filterTeams() {
    const query = document.getElementById('searchTeam').value.toLowerCase().trim();
    const cards = document.querySelectorAll('.team-card');
    cards.forEach(card => {
      const codeMatch = card.dataset.code?.includes(query);
      const nameMatch = card.dataset.name?.includes(query);
      if(query === "" || codeMatch || nameMatch) card.classList.remove('hidden');
      else card.classList.add('hidden');
    });
  }

  let toastTimeout;
  function showToast(msg, duration=1800) {
    const toastEl = document.getElementById('toastMsg');
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => {
      toastEl.classList.remove('show');
    }, duration);
  }

  function setView(view) {
    currentView = view;
    document.getElementById('albumBtn').classList.remove('active-view');
    document.getElementById('missingBtn').classList.remove('active-view');
    document.getElementById('duplicatesBtn').classList.remove('active-view');
    
    if (view === 'album') {
      document.getElementById('albumBtn').classList.add('active-view');
    } else if (view === 'missing') {
      document.getElementById('missingBtn').classList.add('active-view');
    } else if (view === 'duplicates') {
      document.getElementById('duplicatesBtn').classList.add('active-view');
    }
    
    updateGlobalStats();
    showToast(view === 'album' ? '📒 Vista Álbum' : view === 'missing' ? '🔍 Mostrando faltantes' : '🔄 Mostrando repetidas', 1500);
  }

  document.getElementById('albumBtn').onclick = () => setView('album');
  document.getElementById('missingBtn').onclick = () => setView('missing');
  document.getElementById('duplicatesBtn').onclick = () => setView('duplicates');
  document.getElementById('pdfBtn').onclick = generatePDF;
  document.getElementById('searchTeam').addEventListener('input', filterTeams);

  renderAll();
</script>
</body>
</html>
