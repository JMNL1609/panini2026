<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
  <title>FIFA World Cup 2026 · Panini · Álbum Interactivo</title>
  
  <meta name="theme-color" content="#030614">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Panini 2026">
  <link rel="manifest" href="manifest.json">
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --grid-unit: 8px;
      --grid-half: 4px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --touch-min: 48px;
      --touch-large: 56px;
      --gold: #F5C542;
      --gold-dark: #C6921E;
      --gold-glow: rgba(245, 197, 66, 0.35);
      --red: #E03A3E;
      --red-dim: #A12226;
      --blue-deep: #0A1A3A;
      --blue-mid: #0F2648;
      --blue-light: #1A3A6E;
      --bg-main: #030614;
      --card-bg: #0B1429;
      --border-glow: rgba(245, 197, 66, 0.25);
      --text-light: #F0F3FA;
      --text-muted: #8A9DC0;
      --text-white: #FFFFFF;
      --owned-bg: #0C331F;
      --owned-border: #2AD18A;
      --owned-text: #A3F0C0;
      --orange-bg: #3B1A0A;
      --orange-border: #FF8C00;
      --orange-text: #FFD700;
      --stadium-gradient: linear-gradient(145deg, #0C1428 0%, #061027 100%);
    }

    html {
      font-size: 16px;
    }

    body {
      background: var(--bg-main);
      font-family: 'Inter', sans-serif;
      color: var(--text-light);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(circle at 20% 40%, rgba(232, 192, 68, 0.03) 0%, transparent 40%),
        repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 2px, transparent 2px, transparent 8px);
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      position: relative;
      background: linear-gradient(135deg, #04112e 0%, #071a3a 100%);
      border-bottom: 3px solid var(--gold);
      padding: var(--space-lg) var(--space-md);
      text-align: center;
      overflow: hidden;
      box-shadow: 0 var(--space-sm) var(--space-lg) rgba(0,0,0,0.4);
    }

    .hero::after {
      content: "⚽🏆⚽";
      position: absolute;
      bottom: 0;
      right: 10px;
      font-size: 70px;
      opacity: 0.05;
      pointer-events: none;
      font-family: monospace;
      white-space: pre;
    }

    .trophy-icon {
      font-size: 2.5rem;
      filter: drop-shadow(0 0 12px var(--gold-glow));
      animation: floatTrophy 3s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes floatTrophy {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }

    .main-title {
      font-family: 'Bebas Neue', cursive;
      font-size: clamp(1.8rem, 7vw, 3.5rem);
      letter-spacing: 4px;
      background: linear-gradient(135deg, #FFE6A3, #E8B82E);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
      margin: var(--space-xs) 0;
    }

    .subhead {
      font-size: 0.65rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      border-top: 1px dashed rgba(245,197,66,0.3);
      display: inline-block;
      padding-top: var(--space-sm);
    }

    .owner-badge {
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      border-radius: 40px;
      padding: var(--space-xs) var(--space-md);
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: var(--space-sm);
      border: 1px solid rgba(245,197,66,0.4);
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-white);
    }

    .owner-badge span {
      color: var(--text-white);
    }

    .stats-panel {
      background: rgba(8, 18, 38, 0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-glow);
      padding: var(--space-md);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--space-sm);
      align-items: center;
    }

    .stat-card {
      background: rgba(255,255,255,0.02);
      padding: var(--space-sm) var(--space-md);
      border-radius: 24px;
      min-width: 0;
      min-height: var(--touch-min);
      text-align: center;
      border: 1px solid rgba(245,197,66,0.15);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .stat-number {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      line-height: 1;
      font-weight: 600;
    }

    .stat-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--text-muted);
    }

    .gold-text { color: var(--gold); }
    .green-text { color: #2AD18A; }
    .red-text { color: #FF6B6B; }

    .progress-container {
      grid-column: 1 / -1;
      min-width: 0;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
      margin-bottom: var(--space-xs);
      font-weight: 600;
      color: var(--text-white);
    }

    .progress-header span {
      color: var(--text-white);
    }

    .progress-bar-bg {
      background: #1F2A44;
      height: 10px;
      border-radius: 12px;
      overflow: hidden;
    }

    .progress-fill-main {
      background: linear-gradient(90deg, var(--gold), #2AD18A);
      width: 0%;
      height: 100%;
      border-radius: 12px;
      transition: width 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }

    .action-bar {
      padding: var(--space-sm) var(--space-md);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-sm);
      align-items: center;
      background: rgba(6, 14, 28, 0.8);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(245,197,66,0.2);
    }

    .search-field {
      grid-column: 1 / -1;
      min-width: 0;
      background: #0A1125;
      border: 1px solid var(--border-glow);
      border-radius: 48px;
      padding: var(--space-sm) var(--space-md);
      display: flex;
      gap: var(--space-sm);
      align-items: center;
      min-height: var(--touch-min);
    }

    .search-field input {
      background: transparent;
      border: none;
      flex: 1;
      color: white;
      font-size: 0.85rem;
      outline: none;
    }

    .search-field input::placeholder {
      color: #5F74A0;
      font-size: 0.75rem;
    }

    .btn {
      background: rgba(20, 35, 65, 0.9);
      border: 1px solid rgba(245,197,66,0.4);
      padding: 0 var(--space-md);
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 1px;
      color: #E0E9FF;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
      min-height: var(--touch-min);
      white-space: nowrap;
    }

    .btn:active { transform: scale(0.96); background: rgba(245,197,66,0.2);}
    
    .btn.active-view {
      background: rgba(245,197,66,0.25);
      border-color: var(--gold);
      color: var(--gold);
    }

    .btn-pdf {
      background: rgba(220, 53, 69, 0.2);
      border: 1px solid #dc3545;
      color: #ff6b6b;
      display: none;
    }

    .btn-pdf.visible {
      display: inline-flex;
    }

    .flags-nav {
      padding: var(--space-sm) var(--space-md);
      background: rgba(10, 20, 40, 0.7);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(245,197,66,0.2);
      display: flex;
      flex-wrap: nowrap;
      gap: var(--space-sm);
      align-items: center;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .flags-nav::-webkit-scrollbar {
      display: none;
    }

    .flag-btn {
      background: rgba(20, 30, 55, 0.8);
      border: 1px solid rgba(245,197,66,0.3);
      border-radius: 30px;
      padding: var(--space-sm) var(--space-md);
      font-size: 0.8rem;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      color: var(--text-light);
      backdrop-filter: blur(4px);
      min-height: 44px;
      flex-shrink: 0;
    }

    .flag-btn:active {
      transform: scale(0.94);
      background: rgba(245,197,66,0.3);
    }

    .teams-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      padding: var(--space-md);
      max-width: 100%;
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .team-card {
      background: var(--card-bg);
      border-radius: 20px;
      border: 1px solid rgba(245,197,66,0.2);
      overflow: hidden;
      transition: all 0.2s;
      backdrop-filter: blur(2px);
    }

    .team-card.complete {
      border-color: #2AD18A;
      box-shadow: 0 0 8px rgba(42,209,138,0.3);
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: linear-gradient(95deg, rgba(245,197,66,0.08), transparent);
      cursor: default;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      min-height: var(--touch-min);
    }

    .team-flag {
      font-size: 1.5rem;
      filter: drop-shadow(0 2px 4px black);
      flex-shrink: 0;
    }

    .team-code {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.2rem;
      color: var(--gold);
      letter-spacing: 1px;
      flex-shrink: 0;
    }

    .team-name {
      flex: 1;
      font-weight: 600;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
    }

    .team-stats {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: 0.65rem;
      font-weight: 700;
      flex-shrink: 0;
      cursor: pointer;
      pointer-events: auto;
      padding: 4px 8px;
      border-radius: 12px;
      transition: background 0.2s;
    }

    .team-stats:hover {
      background: rgba(245,197,66,0.1);
    }

    .team-stats:active {
      background: rgba(245,197,66,0.2);
    }

    .team-progress-bar {
      width: 40px;
      height: 4px;
      background: #1F2A44;
      border-radius: 4px;
      overflow: hidden;
    }

    .team-progress-fill {
      height: 100%;
      background: var(--gold);
      width: 0%;
      border-radius: 4px;
    }

    .complete-tag {
      background: #1c5438;
      padding: 0 6px;
      border-radius: 20px;
      font-size: 0.5rem;
      color: #A2F0C0;
      display: none;
    }

    .team-card.complete .complete-tag { display: inline-block; }

    .sticker-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-xs);
      padding: var(--space-sm);
      padding-bottom: 48px;
      background: rgba(0,0,0,0.2);
      position: relative;
      justify-content: flex-start;
    }

    .sticker {
      width: calc(20% - 4px);
      min-width: 48px;
      height: 48px;
      background: #0F172F;
      border-radius: 8px;
      border: 1px solid #2A3A60;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', monospace;
      font-size: 0.6rem;
      font-weight: 700;
      color: #9AACD0;
      cursor: pointer;
      transition: all 0.12s linear;
      backdrop-filter: blur(2px);
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
      position: relative;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    .sticker:active {
      transform: scale(0.96);
    }

    .sticker.owned {
      background: linear-gradient(145deg, #0D3B20, #072613);
      border-color: var(--owned-border);
      color: #C6FFDD;
      box-shadow: 0 0 6px rgba(42,209,138,0.3);
    }

    .sticker.duplicate {
      background: linear-gradient(145deg, #3B1A0A, #2A0E04);
      border-color: #FF8C00;
      color: #FFD700;
      box-shadow: 0 0 8px rgba(255,140,0,0.4);
    }

    .duplicate-badge {
      position: absolute;
      top: -6px;
      right: -6px;
      background: #FF8C00;
      color: white;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.55rem;
      font-weight: 900;
      border: 2px solid #030614;
      box-shadow: 0 0 8px rgba(255,140,0,0.6);
      z-index: 10;
    }

    @keyframes stickerPop {
      0% { transform: scale(1); background: rgba(245,197,66,0.3);}
      50% { transform: scale(1.2); background: rgba(245,197,66,0.5);}
      100% { transform: scale(1);}
    }

    .sticker-pop {
      animation: stickerPop 0.2s ease;
    }

    .team-card.hidden {
      display: none;
    }

    .scroll-top-btn {
      position: absolute;
      bottom: var(--space-sm);
      right: var(--space-md);
      background: rgba(20, 35, 65, 0.9);
      border: 1px solid var(--gold);
      border-radius: 20px;
      padding: var(--space-xs) var(--space-md);
      font-size: 0.6rem;
      font-weight: 600;
      color: var(--gold);
      cursor: pointer;
      backdrop-filter: blur(4px);
      transition: all 0.2s;
      z-index: 5;
      min-height: 36px;
    }

    .scroll-top-btn:active {
      transform: scale(0.94);
      background: rgba(245,197,66,0.2);
    }

    .toast-notify {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #101a32e6;
      backdrop-filter: blur(12px);
      padding: 10px 24px;
      border-radius: 60px;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-weight: 600;
      font-size: 0.85rem;
      z-index: 1000;
      transition: transform 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
      font-family: monospace;
    }

    .toast-notify.show {
      transform: translateX(-50%) translateY(0px);
    }

    .world-cup-footer {
      text-align: center;
      padding: var(--space-lg) var(--space-md);
      font-size: 0.55rem;
      color: #4a6188;
      border-top: 1px solid rgba(245,197,66,0.15);
      margin-top: var(--space-md);
      background: radial-gradient(circle at bottom, #0a0f1e, transparent);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: var(--space-md);
    }

    .modal-dialog {
      background: linear-gradient(145deg, #0F1A3A, #081028);
      border: 2px solid var(--gold);
      border-radius: 20px;
      padding: var(--space-lg);
      text-align: center;
      box-shadow: 0 0 30px rgba(245,197,66,0.3);
      max-width: 320px;
      width: 100%;
    }

    .modal-dialog p {
      font-size: 0.85rem;
      margin-bottom: var(--space-lg);
      color: var(--text-light);
    }

    .modal-buttons {
      display: flex;
      gap: var(--space-md);
      justify-content: center;
    }

    .modal-buttons button {
      padding: var(--space-sm) var(--space-lg);
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.8rem;
      min-height: var(--touch-min);
    }

    .btn-undo {
      background: rgba(245,197,66,0.2);
      border: 2px solid var(--gold);
      color: var(--gold);
    }

    .btn-close {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
    }

    /* TABLET / HORIZONTAL (600dp+) */
    @media (min-width: 600px) {
      .stats-panel {
        grid-template-columns: repeat(4, 1fr);
        gap: var(--space-md);
        padding: var(--space-md) var(--space-lg);
      }

      .progress-container {
        grid-column: 1 / -1;
      }

      .action-bar {
        grid-template-columns: 2fr 1fr 1fr 1fr 1fr;
        padding: var(--space-sm) var(--space-lg);
      }

      .search-field {
        grid-column: auto;
      }

      .teams-grid {
        grid-template-columns: repeat(2, 1fr);
        padding: var(--space-lg);
        gap: var(--space-lg);
      }

      .sticker {
        width: 56px;
        height: 40px;
        font-size: 0.65rem;
      }

      .sticker-grid {
        justify-content: center;
      }

      .team-code {
        font-size: 1.4rem;
      }

      .team-name {
        font-size: 0.7rem;
      }

      .btn {
        font-size: 0.75rem;
      }

      .flag-btn {
        font-size: 0.85rem;
        padding: var(--space-sm) var(--space-lg);
      }
    }

    /* DESKTOP (900dp+) */
    @media (min-width: 900px) {
      .teams-grid {
        grid-template-columns: repeat(3, 1fr);
        max-width: 1400px;
      }

      .main-title {
        font-size: clamp(2.5rem, 5vw, 3.8rem);
        letter-spacing: 6px;
      }

      .sticker {
        width: 58px;
        height: 36px;
        font-size: 0.7rem;
      }
    }

    /* LARGE DESKTOP (1200dp+) */
    @media (min-width: 1200px) {
      .teams-grid {
        grid-template-columns: repeat(4, 1fr);
        max-width: 1600px;
      }
    }
  </style>
</head>
<body>

<div class="hero" id="topPage">
  <div class="trophy-icon">🏆✨⚽</div>
  <h1 class="main-title">FIFA WORLD CUP 2026</h1>
  <div class="subhead">PANINI DIGITAL ALBUM · EDITION GOLD</div>
  <div class="owner-badge">
    <span>👤</span>
    <span style="letter-spacing: 1.5px;">SEBASTIAN NAVARRO</span>
    <span style="font-size:1rem;">🇲🇽🇺🇸🇨🇦</span>
  </div>
</div>

<div class="stats-panel">
  <div class="stat-card"><div class="stat-number green-text" id="stat-owned">0</div><div class="stat-label">TENGO</div></div>
  <div class="stat-card"><div class="stat-number red-text" id="stat-missing">0</div><div class="stat-label">FALTAN</div></div>
  <div class="stat-card"><div class="stat-number gold-text" id="stat-total">0</div><div class="stat-label">TOTAL</div></div>
  <div class="stat-card"><div class="stat-number gold-text" id="stat-percent">0%</div><div class="stat-label">COMPLETO</div></div>
  <div class="progress-container">
    <div class="progress-header"><span>🏟️ PROGRESO MUNDIAL 2026</span><span id="progress-ratio">0/0</span></div>
    <div class="progress-bar-bg"><div class="progress-fill-main" id="global-progress-fill"></div></div>
  </div>
</div>

<div class="action-bar">
  <div class="search-field">
    <span>🔍</span>
    <input type="text" id="searchTeam" placeholder="Buscar equipo o código (ej: MEX, Brasil)" autocomplete="off">
  </div>
  <button class="btn active-view" id="albumBtn">📒 Álbum</button>
  <button class="btn" id="missingBtn">🔍 Me faltan</button>
  <button class="btn" id="duplicatesBtn">🔄 Repetidas</button>
  <button class="btn btn-pdf" id="pdfBtn">📄 Exportar PDF</button>
</div>

<div class="flags-nav" id="flagsNavContainer"></div>

<div class="teams-grid" id="teamsContainer"></div>
<div class="world-cup-footer">
  ⚽ 48 EQUIPOS · 988 CROMOS OFICIALES ⚽<br>
  Toca cada sticker para coleccionar · Doble toque para deshacer
</div>
<div id="toastMsg" class="toast-notify"></div>

<script>
  const SECTIONS = [
    { code:'FWC', name:'FIFA World Cup',      flag:'🏆', n:20 },

  function getOwnedCount() {
    return Object.values(ownedState).filter(v => v >= 1).length;
  }

  function getDuplicateCount() {
    return Object.values(ownedState).filter(v => v >= 2).length;
  }

  function getMissingStickers() {
    const missing = [];
    SECTIONS.forEach(sec => {
      const missingInSection = [];
      for(let i=1; i<=sec.n; i++) {
        const stickerId = `${sec.code}${i}`;
        if (!ownedState[stickerId] || ownedState[stickerId] === 0) {
          missingInSection.push({
            id: stickerId, code: sec.code, name: sec.name,
            flag: sec.flag, flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(), number: i
          });
        }
      }
      if (missingInSection.length > 0) {
        missing.push({
          code: sec.code, name: sec.name, flag: sec.flag,
          flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(),
          stickers: missingInSection, count: missingInSection.length
        });
      }
    });
    return missing;
  }

  function getDuplicateStickers() {
    const duplicates = [];
    SECTIONS.forEach(sec => {
      const duplicateInSection = [];
      for(let i=1; i<=sec.n; i++) {
        const stickerId = `${sec.code}${i}`;
        if (ownedState[stickerId] && ownedState[stickerId] >= 2) {
          duplicateInSection.push({
            id: stickerId, code: sec.code, name: sec.name,
            flag: sec.flag, flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(), 
            number: i, duplicates: ownedState[stickerId] - 1
          });
        }
      }
      if (duplicateInSection.length > 0) {
        duplicates.push({
          code: sec.code, name: sec.name, flag: sec.flag,
          flagCdn: FLAG_CDN_MAP[sec.code] || sec.code.toLowerCase(),
          stickers: duplicateInSection, count: duplicateInSection.length
        });
      }
    });
    return duplicates;
  }

  async function generatePDF() {
    const missingData = getMissingStickers();
    if (missingData.length === 0) { showToast('🎉 ¡No tienes cromos faltantes!', 2000); return; }

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'letter' });
      const pageWidth = doc.internal.pageSize.getWidth();
      const pageHeight = doc.internal.pageSize.getHeight();
      const margin = 12;
      
      doc.setFillColor(4, 18, 46);
      doc.rect(0, 0, pageWidth, 35, 'F');
      doc.setDrawColor(245, 197, 66);
      doc.setLineWidth(1.5);
      doc.line(0, 35, pageWidth, 35);
      doc.setTextColor(245, 197, 66);
      doc.setFontSize(24);
      doc.setFont('helvetica', 'bold');
      doc.text('FIFA WORLD CUP 2026', pageWidth / 2, 15, { align: 'center' });
      doc.setTextColor(138, 157, 192);
      doc.setFontSize(8);
      doc.text('PANINI DIGITAL ALBUM · EDITION GOLD', pageWidth / 2, 22, { align: 'center' });
      doc.setTextColor(245, 197, 66);
      doc.setFontSize(9);
      doc.text('SEBASTIAN NAVARRO', pageWidth / 2, 30, { align: 'center' });
      doc.setTextColor(100, 100, 100);
      doc.setFontSize(8);
      doc.text(`Fecha: ${new Date().toLocaleDateString('es-MX', { year: 'numeric', month: 'long', day: 'numeric' })}`, margin, 42);
      const totalMissing = missingData.reduce((sum, team) => sum + team.count, 0);
      doc.text(`Total de cromos faltantes: ${totalMissing} de ${TOTAL_STICKERS}`, margin, 47);
      doc.text(`Progreso: ${Math.round(((TOTAL_STICKERS - totalMissing) / TOTAL_STICKERS) * 100)}% completado`, margin, 52);

      let yPos = 60;
      const maxY = pageHeight - 20;
      const flagCache = {};
      
      for (const team of missingData) {
        if (yPos + 25 > maxY) { doc.addPage(); yPos = 20; addFooter(doc, pageWidth, pageHeight, margin); }
        doc.setFillColor(15, 38, 72);
        doc.roundedRect(margin, yPos, pageWidth - (margin * 2), 4, 2, 2, 'F');
        const flagCode = team.flagCdn;
        let flagImg = null;
        if (!flagCache[flagCode]) {
          try {
            const flagUrl = `https://flagcdn.com/w40/${flagCode}.png`;
            flagImg = await loadImage(flagUrl);
            flagCache[flagCode] = flagImg;
          } catch (e) { console.warn(`No se pudo cargar bandera para ${team.code}`, e); flagCache[flagCode] = null; }
        } else { flagImg = flagCache[flagCode]; }

        if (flagImg && team.code !== 'FWC' && team.code !== 'CC') {
          try { doc.addImage(flagImg, 'PNG', margin + 2, yPos + 0.5, 4, 3); } catch (e) {}
          doc.setTextColor(245, 197, 66); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
          doc.text(`${team.code} - ${team.name}`, margin + 11, yPos + 3);
        } else {
          doc.setTextColor(245, 197, 66); doc.setFontSize(10); doc.setFont('helvetica', 'bold');
          doc.text(`${team.code} - ${team.name}`, margin + 3, yPos + 3);
        }
        doc.setTextColor(255, 107, 107); doc.setFontSize(8);
        doc.text(`(${team.count} faltantes)`, pageWidth - margin - 25, yPos + 2.5, { align: 'right' });
        yPos += 6;

        const stickersPerRow = 20, stickerWidth = 7.5, stickerHeight = 3, startX = margin + 2;
        for (let i = 0; i < team.stickers.length; i += stickersPerRow) {
          if (yPos + stickerHeight + 2 > maxY) { doc.addPage(); yPos = 20; addFooter(doc, pageWidth, pageHeight, margin); }
          const row = team.stickers.slice(i, i + stickersPerRow);
          row.forEach((sticker, index) => {
            const x = startX + (index * (stickerWidth + 2));
            doc.setFillColor(255, 255, 255); doc.roundedRect(x, yPos, stickerWidth, stickerHeight, 1.5, 1.5, 'F');
            doc.setDrawColor(0, 0, 0); doc.setLineWidth(0.3); doc.roundedRect(x, yPos, stickerWidth, stickerHeight, 1.5, 1.5, 'S');
            doc.setTextColor(0, 0, 0); doc.setFontSize(6); doc.setFont('courier', 'bold');
            doc.text(sticker.id, x + stickerWidth/2, yPos + 2, { align: 'center' });
          });
          yPos += stickerHeight + 1.5;
        }
        yPos += 2;
      }
      addFooter(doc, pageWidth, pageHeight, margin);
      const fileName = `Panini2026_Faltantes_${new Date().toISOString().split('T')[0]}.pdf`;
      doc.save(fileName);
      showToast(`✅ PDF generado: ${fileName}`, 2500);
    } catch (error) { console.error('Error generando PDF:', error); showToast('❌ Error al generar PDF. Intenta de nuevo.', 2500); }
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image(); img.crossOrigin = 'Anonymous';
      img.onload = () => resolve(img); img.onerror = reject; img.src = url;
    });
  }

  function updateGlobalStats() {
    const ownedCount = getOwnedCount(), missing = TOTAL_STICKERS - ownedCount;
    const percent = TOTAL_STICKERS ? Math.round((ownedCount / TOTAL_STICKERS) * 100) : 0;
    document.getElementById('stat-owned').innerText = ownedCount;
    document.getElementById('stat-missing').innerText = missing;
    document.getElementById('stat-total').innerText = TOTAL_STICKERS;
    document.getElementById('stat-percent').innerText = `${percent}%`;
    document.getElementById('progress-ratio').innerText = `${ownedCount}/${TOTAL_STICKERS}`;
    document.getElementById('global-progress-fill').style.width = `${percent}%`;
    SECTIONS.forEach(sec => {
      let collected = 0;
      for(let i=1; i<=sec.n; i++) if(ownedState[`${sec.code}${i}`] >= 1) collected++;
      const pbFill = document.getElementById(`pb-${sec.code}`);
      const pnSpan = document.getElementById(`pn-${sec.code}`);
      const cardDiv = document.getElementById(`card-${sec.code}`);
      if(pbFill) pbFill.style.width = `${(collected/sec.n)*100}%`;
      if(pnSpan) { pnSpan.innerText = `${collected}/${sec.n}`; pnSpan.style.color = collected === sec.n ? '#2AD18A' : '#8A9DC0'; }
      if(cardDiv) { cardDiv.classList.toggle('complete', collected === sec.n); applyCurrentView(cardDiv, sec, collected); }
    });
    const pdfBtn = document.getElementById('pdfBtn');
    pdfBtn.classList.toggle('visible', currentView === 'missing' || currentView === 'duplicates');
    
    // Cambiar texto y función del botón PDF según la vista actual
    if (currentView === 'missing') {
      pdfBtn.textContent = '📄 Exportar PDF';
      pdfBtn.onclick = generatePDF;
    } else if (currentView === 'duplicates') {
      pdfBtn.textContent = '📄 Exportar PDF Repetidas';
      pdfBtn.onclick = generateDuplicatesPDF;
    } else {
      pdfBtn.onclick = generatePDF;
    }
  }
  
  function applyCurrentView(cardDiv, sec, collected) {
    const stickers = cardDiv.querySelectorAll('.sticker');
    stickers.forEach(s => s.style.display = 'flex');
    if (currentView === 'missing') {
      cardDiv.classList.toggle('hidden', collected === sec.n);
      stickers.forEach(s => { if (ownedState[s.getAttribute('data-sticker-id')] >= 1) s.style.display = 'none'; });
    } else if (currentView === 'duplicates') {
      let has = false;
      stickers.forEach(s => {
        if (ownedState[s.getAttribute('data-sticker-id')] >= 2) { s.style.display = 'flex'; has = true; }
        else s.style.display = 'none';
      });
      cardDiv.classList.toggle('hidden', !has);
    } else { cardDiv.classList.remove('hidden'); }
  }

  function renderFlagsNav() {
    const fc = document.getElementById('flagsNavContainer'); fc.innerHTML = '';
    SECTIONS.forEach(sec => {
      const fb = document.createElement('div'); fb.className = 'flag-btn';
      fb.innerHTML = `${sec.flag} ${sec.code}`;
      fb.onclick = () => {
        const tc = document.getElementById(`card-${sec.code}`);
        if(tc) { tc.scrollIntoView({ behavior: 'smooth', block: 'center' }); tc.style.boxShadow = '0 0 20px rgba(245,197,66,0.6)'; setTimeout(() => tc.style.boxShadow = '', 1500); }
      };
      fc.appendChild(fb);
    });
  }

  function updateStickerAppearance(el, id) {
    const count = ownedState[id] || 0;
    el.classList.remove('owned', 'duplicate');
    const badge = el.querySelector('.duplicate-badge'); if(badge) badge.remove();
    if(count === 1) el.classList.add('owned');
    else if(count >= 2) { el.classList.add('duplicate'); const b = document.createElement('div'); b.className = 'duplicate-badge'; b.textContent = count-1; el.appendChild(b); }
  }

  let tapTimer = null;

  function handleStickerTouch(sid, e) {
    e.stopPropagation();
    e.preventDefault();
    
    const currentTime = new Date().getTime();
    const tapLength = currentTime - lastTapTime;
    
    if (tapLength < DOUBLE_TAP_DELAY && tapLength > 0) {
      // ¡DOBLE TOQUE! Cancelar el temporizador del primer toque
      clearTimeout(tapTimer);
      tapTimer = null;
      lastTapTime = 0;
      
      // Mostrar modal de deshacer (sin sumar sticker)
      const count = ownedState[sid] || 0;
      if (count >= 1) {
        showUndoModal(sid);
      } else {
        showToast(`${sid} no está marcado`, 1200);
      }
    } else {
      // POSIBLE PRIMER TOQUE: esperar a ver si viene otro
      lastTapTime = currentTime;
      
      // Cancelar cualquier temporizador pendiente
      if (tapTimer) clearTimeout(tapTimer);
      
      // Retrasar la acción de marcar para esperar un posible segundo toque
      tapTimer = setTimeout(() => {
        handleStickerClick(sid);
        tapTimer = null;
        lastTapTime = 0;
      }, DOUBLE_TAP_DELAY);
    }
  }

  function handleTeamStatsClick(secCode) {
    const cardDiv = document.getElementById(`card-${secCode}`);
    if (!cardDiv) return;
    
    const stickers = cardDiv.querySelectorAll('.sticker');
    let allMarked = true;
    
    // Verificar si todos los stickers ya están marcados
    for (let sticker of stickers) {
      const sid = sticker.getAttribute('data-sticker-id');
      if (!ownedState[sid] || ownedState[sid] < 1) {
        allMarked = false;
        break;
      }
    }
    
    if (allMarked) {
      // Si todos están marcados, guardar estado actual y desmarcar solo los que se marcaron en esta acción
      // Para simplificar: si todos están marcados, mostrar un toast y no hacer nada
      showToast(`✅ ${secCode} ya está completo`, 1500);
      return;
    }
    
    // Guardar el estado actual antes de modificar
    const previousState = {...ownedState};
    
    // Marcar todos los stickers que no están marcados
    for (let sticker of stickers) {
      const sid = sticker.getAttribute('data-sticker-id');
      if (!ownedState[sid] || ownedState[sid] < 1) {
        ownedState[sid] = 1;
      }
    }
    
    persist();
    updateAllStickersUI(secCode);
    updateGlobalStats();
    showToast(`✅ Todos los stickers de ${secCode} marcados`, 1500);
  }

  function updateAllStickersUI(secCode) {
    const cardDiv = document.getElementById(`card-${secCode}`);
    if (!cardDiv) return;
    
    const stickers = cardDiv.querySelectorAll('.sticker');
    stickers.forEach(sticker => {
      const sid = sticker.getAttribute('data-sticker-id');
      updateStickerAppearance(sticker, sid);
    });
  }

  function renderAll() {
    const container = document.getElementById('teamsContainer'); container.innerHTML = '';
    SECTIONS.forEach(sec => {
      const card = document.createElement('div'); card.className = 'team-card'; card.id = `card-${sec.code}`;
      card.dataset.code = sec.code.toLowerCase(); card.dataset.name = sec.name.toLowerCase();
      const header = document.createElement('div'); header.className = 'team-header';
      header.innerHTML = `<span class="team-flag">${sec.flag}</span><span class="team-code">${sec.code}</span><span class="team-name">${sec.name}</span><div class="team-stats" id="team-stats-${sec.code}"><span id="pn-${sec.code}" style="font-weight:600;">0/${sec.n}</span><div class="team-progress-bar"><div class="team-progress-fill" id="pb-${sec.code}" style="width:0%"></div></div><span class="complete-tag">✓ COMPLETO</span></div>`;
      card.appendChild(header);
      
      // Agregar evento click al team-stats
      const teamStatsDiv = header.querySelector('.team-stats');
      teamStatsDiv.onclick = (e) => {
        e.stopPropagation();
        handleTeamStatsClick(sec.code);
      };
      
      const gridDiv = document.createElement('div'); gridDiv.className = 'sticker-grid';
      
      // Para FWC, agregar sticker 00 primero
      if (sec.code === 'FWC') {
        const sid00 = 'FWC00';
        const count00 = ownedState[sid00] || 0;
        const el00 = document.createElement('div'); 
        el00.className = 'sticker'; 
        el00.textContent = sid00; 
        el00.setAttribute('data-sticker-id', sid00);
        if(count00 === 1) el00.classList.add('owned');
        else if(count00 >= 2) { 
          el00.classList.add('duplicate'); 
          const b = document.createElement('div'); 
          b.className = 'duplicate-badge'; 
          b.textContent = count00-1; 
          el00.appendChild(b); 
        }
        el00.onclick = (e) => { handleStickerTouch(sid00, e); };
        el00.addEventListener('contextmenu', (e) => e.preventDefault());
        gridDiv.appendChild(el00);
      }
      
      for(let i=1; i<=sec.n; i++) {
        const sid = `${sec.code}${i}`, count = ownedState[sid] || 0;
        const el = document.createElement('div'); el.className = 'sticker'; el.textContent = sid; el.setAttribute('data-sticker-id', sid);
        if(count === 1) el.classList.add('owned');
        else if(count >= 2) { el.classList.add('duplicate'); const b = document.createElement('div'); b.className = 'duplicate-badge'; b.textContent = count-1; el.appendChild(b); }
        
        el.onclick = (e) => { handleStickerTouch(sid, e); };
        el.addEventListener('contextmenu', (e) => e.preventDefault());
        
        gridDiv.appendChild(el);
      }
      const stb = document.createElement('button'); stb.className = 'scroll-top-btn'; stb.textContent = '⬆️ Subir';
      stb.onclick = (e) => { e.stopPropagation(); document.getElementById('topPage').scrollIntoView({ behavior: 'smooth' }); };
      gridDiv.appendChild(stb); card.appendChild(gridDiv); container.appendChild(card);
    });
    renderFlagsNav(); updateGlobalStats();
  }

  function showUndoModal(stickerId) {
    const count = ownedState[stickerId] || 0;
    if(count === 0) { showToast(`${stickerId} no está marcado`, 1200); return; }
    
    // Resetear todo para evitar conflictos
    lastTapTime = 0;
    if (tapTimer) { clearTimeout(tapTimer); tapTimer = null; }
    
    const overlay = document.createElement('div'); overlay.className = 'modal-overlay';
    const dialog = document.createElement('div'); dialog.className = 'modal-dialog';
    dialog.innerHTML = `<p>¿Deseas deshacer ${stickerId}? (Estado: ${count > 1 ? 'Repetida x'+(count-1) : 'Marcada'})</p><div class="modal-buttons"><button class="btn-undo">↩️ Deshacer</button><button class="btn-close">✖️ Cerrar</button></div>`;
    
    dialog.querySelector('.btn-undo').onclick = (e) => { 
      e.stopPropagation(); 
      e.preventDefault();
      undoSticker(stickerId); 
      document.body.removeChild(overlay); 
    };
    
    dialog.querySelector('.btn-close').onclick = (e) => { 
      e.stopPropagation(); 
      e.preventDefault();
      document.body.removeChild(overlay); 
    };
    
    overlay.onclick = (e) => { 
      if(e.target === overlay) {
        document.body.removeChild(overlay); 
      }
    };
    
    overlay.appendChild(dialog); 
    document.body.appendChild(overlay);
  }

  function undoSticker(stickerId) {
    const count = ownedState[stickerId] || 0; if(count === 0) return;
    if(count === 1) delete ownedState[stickerId]; else ownedState[stickerId] = count - 1;
    persist(); updateStickerUI(stickerId); updateGlobalStats();
    showToast(`${stickerId} deshecho un paso`, 1200);
  }

  function handleStickerClick(stickerId) {
    const count = ownedState[stickerId] || 0;
    if(count === 0) { ownedState[stickerId] = 1; showToast(`+ ${stickerId} obtenido`, 1200); }
    else if(count === 1) { ownedState[stickerId] = 2; showToast(`🔄 ${stickerId} repetida`, 1200); }
    else { ownedState[stickerId] = count + 1; showToast(`🔄 ${stickerId} repetida x${count}`, 1200); }
    persist(); updateStickerUI(stickerId); updateGlobalStats();
  }

  function updateStickerUI(stickerId) {
    const el = document.querySelector(`.sticker[data-sticker-id="${stickerId}"]`);
    if(el) { updateStickerAppearance(el, stickerId); el.classList.add('sticker-pop'); setTimeout(() => el.classList.remove('sticker-pop'), 200);
      const card = el.closest('.team-card'); if(card) { const sec = SECTIONS.find(s => s.code === card.id.replace('card-',''));
        if(sec) { let c = 0; for(let i=1; i<=sec.n; i++) if(ownedState[`${sec.code}${i}`] >= 1) c++; 
          // También contar el sticker 00 para FWC
          if(sec.code === 'FWC' && ownedState['FWC00'] >= 1) c++;
          applyCurrentView(card, sec, c); } } }
  }

  function filterTeams() {
    const q = document.getElementById('searchTeam').value.toLowerCase().trim();
    document.querySelectorAll('.team-card').forEach(c => {
      const m = c.dataset.code?.includes(q) || c.dataset.name?.includes(q);
      c.classList.toggle('hidden', q !== "" && !m);
    });
  }

  let toastTimeout;
  function showToast(msg, duration=1800) {
    const t = document.getElementById('toastMsg'); t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimeout); toastTimeout = setTimeout(() => t.classList.remove('show'), duration);
  }

  function setView(view) {
    currentView = view;
    ['albumBtn','missingBtn','duplicatesBtn'].forEach(id => document.getElementById(id).classList.remove('active-view'));
    if(view === 'album') document.getElementById('albumBtn').classList.add('active-view');
    else if(view === 'missing') document.getElementById('missingBtn').classList.add('active-view');
    else document.getElementById('duplicatesBtn').classList.add('active-view');
    updateGlobalStats();
    showToast(view === 'album' ? '📒 Vista Álbum' : view === 'missing' ? '🔍 Mostrando faltantes' : '🔄 Mostrando repetidas', 1500);
  }

  document.getElementById('albumBtn').onclick = () => setView('album');
  document.getElementById('missingBtn').onclick = () => setView('missing');
  document.getElementById('duplicatesBtn').onclick = () => setView('duplicates');
  document.getElementById('searchTeam').addEventListener('input', filterTeams);

  renderAll();
</script>
</body>
</html>
